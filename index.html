<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AI Trading SMC Pro - XAUUSD</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:system-ui;background:#0a0f1e;color:#e2e8f0;padding:16px;padding-bottom:120px;text-align:center;}
    .price{font-size:48px;font-weight:bold;color:#fbbf24;margin:20px 0;}
    .status{font-size:20px;margin:10px 0;}
    button{background:#3b82f6;border:none;padding:12px 24px;border-radius:40px;color:white;font-weight:bold;margin-top:20px;cursor:pointer;}
    input{background:#0f172a;border:1px solid #334155;padding:12px;border-radius:40px;color:white;width:80%;margin:10px 0;}
  </style>
</head>
<body>
  <h1>🤖 AI Trading SMC Pro - XAUUSD</h1>
  <div class="price" id="price">กำลังโหลด...</div>
  <div class="status" id="status"></div>
  <button onclick="fetchPrice()">🔄 รีเฟรช</button>
  
  <div style="margin-top:30px">
    <input type="text" id="chatInput" placeholder="💬 ถาม AI เช่น เทรดทองตอนนี้ดีไหม">
    <button onclick="askAI()">ส่ง</button>
  </div>
  <div id="chatReply" style="margin-top:20px;background:#1e293b;padding:16px;border-radius:24px;"></div>

  <script>
    async function fetchPrice() {
      try {
        const res = await fetch('https://api.twelvedata.com/price?symbol=XAU/USD&apikey=0be46e7fd9994be88453962882bfb522');
        const data = await res.json();
        document.getElementById('price').innerHTML = `$${data.price}`;
        document.getElementById('status').innerHTML = `อัปเดตล่าสุด: ${new Date().toLocaleTimeString('th-TH')}`;
      } catch(e) {
        document.getElementById('price').innerHTML = 'เชื่อมต่อไม่ได้';
      }
    }
    
    async function askAI() {
      const msg = document.getElementById('chatInput').value.trim();
      if(!msg) return;
      document.getElementById('chatReply').innerHTML = '🤔 กำลังคิด...';
      
      try {
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer sk-or-v1-9b2e4f7a1c3d5e8b0a6c4d2f8e1a7c9b3d5f7e9a1c4b6d8f0e2a4c6b8d0e2f4' },
          body: JSON.stringify({
            model: 'deepseek/deepseek-chat:free',
            messages: [{ role: 'user', content: `คุณคือผู้ช่วยเทรดทองคำ XAUUSD ตอบสั้น เป็นไทย: ${msg}` }]
          })
        });
        const data = await res.json();
        document.getElementById('chatReply').innerHTML = `💬 ${data.choices?.[0]?.message?.content || 'ไม่สามารถตอบได้'}`;
      } catch(e) {
        document.getElementById('chatReply').innerHTML = '💬 AI ไม่ตอบชั่วคราว ลองใหม่ทีหลัง';
      }
    }
    
    fetchPrice();
    setInterval(fetchPrice, 10000);
  </script>
</body>
</html>
