<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🤖 AI Trading SMC Pro - XAUUSD</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:system-ui;background:#0a0f1e;color:#e2e8f0;padding:16px;padding-bottom:120px;}
    .card{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:24px;padding:20px;margin-bottom:16px;border:1px solid #334155;}
    .price{font-size:36px;font-weight:bold;color:#fbbf24;}
    .action{font-size:28px;font-weight:bold;margin-top:8px;padding:12px;border-radius:16px;text-align:center;}
    .buy{background:rgba(34,197,94,0.2);color:#4ade80;border:1px solid #4ade80;}
    .sell{background:rgba(239,68,68,0.2);color:#f87171;border:1px solid #f87171;}
    .wait{background:rgba(250,204,21,0.2);color:#facc15;border:1px solid #facc15;}
    .bias-container{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px;}
    .bias-item{text-align:center;padding:8px;background:#0f172a;border-radius:12px;}
    .bias-label{font-size:12px;color:#94a3b8;}
    .bias-value{font-size:20px;font-weight:bold;margin-top:4px;}
    .bull{color:#4ade80;}.bear{color:#f87171;}.neutral{color:#94a3b8;}
    .signal-list{max-height:300px;overflow-y:auto;}
    .signal-item{border-bottom:1px solid #334155;padding:10px 0;display:flex;justify-content:space-between;}
    .chat-input{position:fixed;bottom:0;left:0;right:0;background:#1e293b;padding:12px;border-top:1px solid #334155;display:flex;gap:8px;}
    .chat-input input{flex:1;background:#0f172a;border:1px solid #334155;padding:12px 16px;border-radius:40px;color:white;}
    .chat-input button{background:#3b82f6;border:none;padding:12px 24px;border-radius:40px;color:white;font-weight:bold;cursor:pointer;}
    .chat-reply{margin-top:8px;background:#0f172a;padding:12px;border-radius:16px;border-left:3px solid #3b82f6;}
    h1{text-align:center;margin-bottom:20px;color:#60a5fa;font-size:24px;}
    .score-panel{display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid #334155;}
  </style>
</head>
<body>
  <h1>🤖 AI Trading SMC Pro - XAUUSD (ทองคำ)</h1>
  <div class="card">
    <div class="price" id="price">$---</div>
    <div class="action wait" id="action">กำลังเชื่อมต่อ...</div>
    <div class="bias-container">
      <div class="bias-item"><div class="bias-label">1 ชั่วโมง</div><div class="bias-value neutral" id="bias1h">-</div></div>
      <div class="bias-item"><div class="bias-label">15 นาที</div><div class="bias-value neutral" id="bias15m">-</div></div>
      <div class="bias-item"><div class="bias-label">5 นาที</div><div class="bias-value neutral" id="bias5m">-</div></div>
    </div>
    <div class="score-panel">
      <span>📊 RSI: <strong id="rsi">--</strong></span>
      <span>🟢 แรงซื้อ: <strong id="bullScore">0</strong></span>
      <span>🔴 แรงขาย: <strong id="bearScore">0</strong></span>
    </div>
  </div>
  <div class="card"><h2>📋 ประวัติสัญญาณ</h2><div class="signal-list" id="signals"><div>กำลังเชื่อมต่อ WebSocket...</div></div></div>
  <div class="chat-input"><input id="chatInput" placeholder="💬 ถาม AI"><button id="sendBtn">ส่ง</button></div>
  <div id="chatReply" style="margin:8px 12px 80px 12px;"></div>
  <script>
    function connectWS() {
      const ws = new WebSocket(`wss://${window.location.host}/ws`);
      ws.onmessage = e => {
        const d = JSON.parse(e.data);
        document.getElementById('price').innerHTML = `$${d.price.toFixed(2)}`;
        const ae = document.getElementById('action');
        ae.innerHTML = `${d.action} (${d.confidence}%)`;
        ae.className = `action ${d.action==='BUY'?'buy':d.action==='SELL'?'sell':'wait'}`;
        document.getElementById('bias1h').innerHTML = d.bias.tf1h===1?'▲ BULL':d.bias.tf1h===-1?'▼ BEAR':'● NEUTRAL';
        document.getElementById('bias15m').innerHTML = d.bias.tf15m===1?'▲ BULL':d.bias.tf15m===-1?'▼ BEAR':'● NEUTRAL';
        document.getElementById('bias5m').innerHTML = d.bias.tf5m===1?'▲ BULL':d.bias.tf5m===-1?'▼ BEAR':'● NEUTRAL';
        document.getElementById('rsi').innerHTML = d.rsi;
        document.getElementById('bullScore').innerHTML = d.bullScore;
        document.getElementById('bearScore').innerHTML = d.bearScore;
      };
      ws.onclose = () => setTimeout(connectWS, 3000);
    }
    connectWS();
    document.getElementById('sendBtn').onclick = async () => {
      const msg = document.getElementById('chatInput').value.trim();
      if(!msg) return;
      document.getElementById('chatInput').value='';
      document.getElementById('chatReply').innerHTML='<div class="chat-reply">🤔 กำลังคิด...</div>';
      const res = await fetch('/api/chat', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
      const data = await res.json();
      document.getElementById('chatReply').innerHTML=`<div class="chat-reply">💬 ${data.reply}</div>`;
    };
  </script>
</body>
</html>
