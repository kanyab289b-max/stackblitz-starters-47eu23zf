<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🤖 AI Trading SMC Pro - XAUUSD (ทองคำ)</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:system-ui;background:#0a0f1e;color:#e2e8f0;padding:16px;padding-bottom:120px;}
    .card{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:24px;padding:20px;margin-bottom:16px;border:1px solid #334155;}
    .price{font-size:36px;font-weight:bold;color:#fbbf24;}
    .action{font-size:28px;font-weight:bold;margin-top:8px;padding:12px;border-radius:16px;text-align:center;}
    .buy{background:rgba(34,197,94,0.2);color:#4ade80;border:1px solid #4ade80;}
    .sell{background:rgba(239,68,68,0.2);color:#f87171;border:1px solid #f87171;}
    .wait{background:rgba(250,204,21,0.2);color:#facc15;border:1px solid #facc15;}
    .bias-container{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px;}
    .bias-item{text-align:center;padding:8px;background:#0f172a;border-radius:12px;}
    .bias-label{font-size:12px;color:#94a3b8;}
    .bias-value{font-size:20px;font-weight:bold;margin-top:4px;}
    .bull{color:#4ade80;}.bear{color:#f87171;}.neutral{color:#94a3b8;}
    .signal-list{max-height:300px;overflow-y:auto;}
    .signal-item{border-bottom:1px solid #334155;padding:10px 0;display:flex;justify-content:space-between;}
    .chat-input{position:fixed;bottom:0;left:0;right:0;background:#1e293b;padding:12px;border-top:1px solid #334155;display:flex;gap:8px;}
    .chat-input input{flex:1;background:#0f172a;border:1px solid #334155;padding:12px 16px;border-radius:40px;color:white;}
    .chat-input button{background:#3b82f6;border:none;padding:12px 24px;border-radius:40px;color:white;font-weight:bold;cursor:pointer;}
    .chat-reply{margin-top:8px;background:#0f172a;padding:12px;border-radius:16px;border-left:3px solid #3b82f6;}
    h1{text-align:center;margin-bottom:20px;color:#60a5fa;font-size:24px;}
    .score-panel{display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid #334155;}
    .loading{text-align:center;color:#94a3b8;padding:20px;}
  </style>
</head>
<body>
  <h1>🤖 AI Trading SMC Pro - XAUUSD (ทองคำ)</h1>
  <div class="card">
    <div class="price" id="price">$---</div>
    <div class="action wait" id="action">กำลังโหลดข้อมูลจริง...</div>
    <div class="bias-container">
      <div class="bias-item"><div class="bias-label">1 ชั่วโมง</div><div class="bias-value neutral" id="bias1h">-</div></div>
      <div class="bias-item"><div class="bias-label">15 นาที</div><div class="bias-value neutral" id="bias15m">-</div></div>
      <div class="bias-item"><div class="bias-label">5 นาที</div><div class="bias-value neutral" id="bias5m">-</div></div>
    </div>
    <div class="score-panel">
      <span>📊 RSI: <strong id="rsi">--</strong></span>
      <span>🟢 แรงซื้อ: <strong id="bullScore">0</strong></span>
      <span>🔴 แรงขาย: <strong id="bearScore">0</strong></span>
    </div>
  </div>
  <div class="card"><h2>📋 ประวัติสัญญาณ AI</h2><div class="signal-list" id="signals"><div class="loading">กำลังโหลด...</div></div></div>
  <div class="chat-input"><input id="chatInput" placeholder="💬 ถาม AI"><button id="sendBtn">ส่ง</button></div>
  <div id="chatReply" style="margin:8px 12px 80px 12px;"></div>

  <script>
    // ========== ตัวแปร ==========
    let signals = [];
    let lastAction = '';
    let historicalData = { tf5m: [], tf15m: [], tf1h: [] };
    
    // Twelve Data API Key (อันเดิมที่เคยใช้ได้)
    const API_KEY = '0be46e7fd9994be88453962882bfb522';
    
    // ========== ดึงข้อมูลจาก Twelve Data ==========
    async function fetchCandles(symbol, interval, output = 100) {
      try {
        const url = `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=${interval}&outputsize=${output}&apikey=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        if (data && data.values) {
          return data.values.map(v => ({
            datetime: v.datetime,
            open: parseFloat(v.open),
            high: parseFloat(v.high),
            low: parseFloat(v.low),
            close: parseFloat(v.close)
          })).reverse();
        }
        return [];
      } catch(e) {
        console.error('Fetch error:', e);
        return [];
      }
    }
    
    // ========== โหลดข้อมูลทุก TF ==========
    async function loadAllData() {
      console.log('โหลดข้อมูลจาก Twelve Data...');
      const [tf5m, tf15m, tf1h] = await Promise.all([
        fetchCandles('XAU/USD', '5min', 100),
        fetchCandles('XAU/USD', '15min', 80),
        fetchCandles('XAU/USD', '1h', 80)
      ]);
      if (tf5m.length) historicalData.tf5m = tf5m;
      if (tf15m.length) historicalData.tf15m = tf15m;
      if (tf1h.length) historicalData.tf1h = tf1h;
      console.log(`✅ โหลดสำเร็จ: 5m=${historicalData.tf5m.length}, 15m=${historicalData.tf15m.length}, 1h=${historicalData.tf1h.length}`);
      return historicalData.tf5m.length > 0;
    }
    
    // ========== SMC Functions ==========
    function getBias(candles) {
      if (!candles?.length) return 0;
      const ema20 = candles.slice(-20).reduce((s, c) => s + c.close, 0) / 20;
      return candles[candles.length-1].close > ema20 ? 1 : -1;
    }
    
    function calcRSI(closes, period = 14) {
      if (closes.length < period + 1) return 50;
      let gains = 0, losses = 0;
      for (let i = closes.length - period; i < closes.length; i++) {
        const diff = closes[i] - closes[i-1];
        if (diff >= 0) gains += diff;
        else losses -= diff;
      }
      const avgGain = gains / period, avgLoss = losses / period;
      if (avgLoss === 0) return 100;
      return 100 - (100 / (1 + avgGain / avgLoss));
    }
    
    function detectWick(candle) {
      const range = candle.high - candle.low;
      if (range === 0) return { isBull: false, isBear: false };
      const body = Math.abs(candle.close - candle.open);
      const lowerWick = Math.min(candle.open, candle.close) - candle.low;
      const upperWick = candle.high - Math.max(candle.open, candle.close);
      const isBull = (lowerWick/range) >= 0.65 && (body/range) <= 0.2 && candle.close >= candle.high - range*0.25;
      const isBear = (upperWick/range) >= 0.65 && (body/range) <= 0.2 && candle.close <= candle.low + range*0.25;
      return { isBull, isBear };
    }
    
    function calculateScore(bias5m, bias15m, bias1h, wick, rsi) {
      let bull = 0, bear = 0;
      if (bias1h === 1) bull += 4; else if (bias1h === -1) bear += 4;
      if (bias15m === 1) bull += 2; else if (bias15m === -1) bear += 2;
      if (bias5m === 1) bull += 1; else if (bias5m === -1) bear += 1;
      if (wick.isBull) bull += 4;
      if (wick.isBear) bear += 4;
      if (rsi < 30) bull += 3;
      if (rsi > 70) bear += 3;
      const net = bull - bear;
      let action = 'WAIT', conf = 50;
      if (net >= 5) { action = 'BUY'; conf = 70 + Math.min(25, net); }
      else if (net <= -5) { action = 'SELL'; conf = 70 + Math.min(25, -net); }
      else if (net >= 2) { action = 'BUY'; conf = 55 + net*3; }
      else if (net <= -2) { action = 'SELL'; conf = 55 + (-net)*3; }
      return { action, confidence: Math.min(98, conf), bull, bear };
    }
    
    // ========== อัปเดต UI ==========
    let currentData = { price: 0, rsi: 50, bias: { tf5m: 0, tf15m: 0, tf1h: 0 }, action: 'WAIT', confidence: 50, bullScore: 0, bearScore: 0 };
    
    function updateFromLatestCandle() {
      if (!historicalData.tf5m.length) return false;
      
      const latest = historicalData.tf5m[historicalData.tf5m.length-1];
      const rsi = calcRSI(historicalData.tf5m.slice(-30).map(c => c.close));
      const wick = detectWick(latest);
      const bias5m = getBias(historicalData.tf5m);
      const bias15m = getBias(historicalData.tf15m);
      const bias1h = getBias(historicalData.tf1h);
      const score = calculateScore(bias5m, bias15m, bias1h, wick, rsi);
      
      currentData = {
        price: latest.close,
        rsi: Math.round(rsi),
        bias: { tf5m: bias5m, tf15m: bias15m, tf1h: bias1h },
        action: score.action,
        confidence: score.confidence,
        bullScore: score.bull,
        bearScore: score.bear
      };
      
      // อัปเดต DOM
      document.getElementById('price').innerHTML = `$${currentData.price.toFixed(2)}`;
      document.getElementById('rsi').innerHTML = currentData.rsi;
      document.getElementById('bullScore').innerHTML = currentData.bullScore;
      document.getElementById('bearScore').innerHTML = currentData.bearScore;
      
      const actionEl = document.getElementById('action');
      actionEl.innerHTML = `${currentData.action} (ความเชื่อมั่น ${currentData.confidence}%)`;
      actionEl.className = `action ${currentData.action === 'BUY' ? 'buy' : currentData.action === 'SELL' ? 'sell' : 'wait'}`;
      
      const getText = (b) => b === 1 ? '▲ BULL' : b === -1 ? '▼ BEAR' : '● NEUTRAL';
      const getClass = (b) => b === 1 ? 'bull' : b === -1 ? 'bear' : 'neutral';
      
      document.getElementById('bias1h').innerHTML = getText(currentData.bias.tf1h);
      document.getElementById('bias1h').className = `bias-value ${getClass(currentData.bias.tf1h)}`;
      document.getElementById('bias15m').innerHTML = getText(currentData.bias.tf15m);
      document.getElementById('bias15m').className = `bias-value ${getClass(currentData.bias.tf15m)}`;
      document.getElementById('bias5m').innerHTML = getText(currentData.bias.tf5m);
      document.getElementById('bias5m').className = `bias-value ${getClass(currentData.bias.tf5m)}`;
      
      // บันทึกสัญญาณ
      if (currentData.action !== 'WAIT' && currentData.action !== lastAction) {
        const time = new Date().toLocaleTimeString('th-TH');
        signals.unshift({ time, action: currentData.action, price: currentData.price, confidence: currentData.confidence });
        if (signals.length > 20) signals.pop();
        
        const container = document.getElementById('signals');
        if (signals.length === 0) {
          container.innerHTML = '<div class="loading">รอสัญญาณ...</div>';
        } else {
          container.innerHTML = signals.map(s => `
            <div class="signal-item">
              <span>🕐 ${s.time}</span>
              <span style="color:${s.action === 'BUY' ? '#4ade80' : '#f87171'}">${s.action}</span>
              <span>💰 $${s.price.toFixed(2)}</span>
              <span>🎯 ${s.confidence}%</span>
            </div>
          `).join('');
        }
        lastAction = currentData.action;
      }
      return true;
    }
    
    // ========== โหลดครั้งแรก และอัปเดตทุก 30 วินาที ==========
    async function init() {
      const success = await loadAllData();
      if (success) {
        updateFromLatestCandle();
        setInterval(async () => {
          await loadAllData();
          updateFromLatestCandle();
        }, 30000);
      } else {
        document.getElementById('signals').innerHTML = '<div class="loading">⚠️ ไม่สามารถเชื่อมต่อ Twelve Data API</div>';
      }
    }
    
    init();
    
    // ========== AI Chat (OpenRouter ฟรี) ==========
    document.getElementById('sendBtn').onclick = async () => {
      const msg = document.getElementById('chatInput').value.trim();
      if (!msg) return;
      document.getElementById('chatInput').value = '';
      document.getElementById('chatReply').innerHTML = '<div class="chat-reply">🤔 กำลังคิด...</div>';
      
      const trend = currentData.bias.tf1h === 1 ? 'BULLISH ▲' : currentData.bias.tf1h === -1 ? 'BEARISH ▼' : 'NEUTRAL ●';
      const prompt = `คุณคือผู้ช่วยเทรดทองคำ XAUUSD ข้อมูลปัจจุบัน: ราคา $${currentData.price}, แนวโน้ม 1ชม ${trend}, RSI ${currentData.rsi}. ตอบสั้น เป็นธรรมชาติ เป็นไทย: ${msg}`;
      
      try {
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer sk-or-v1-9b2e4f7a1c3d5e8b0a6c4d2f8e1a7c9b3d5f7e9a1c4b6d8f0e2a4c6b8d0e2f4' },
          body: JSON.stringify({ model: 'deepseek/deepseek-chat:free', messages: [{ role: 'user', content: prompt }] })
        });
        const data = await res.json();
        document.getElementById('chatReply').innerHTML = `<div class="chat-reply">💬 ${data.choices?.[0]?.message?.content || 'ไม่สามารถตอบได้'}</div>`;
      } catch(e) {
        document.getElementById('chatReply').innerHTML = `<div class="chat-reply">💬 📊 XAUUSD: ${trend} | RSI ${currentData.rsi}<br>💡 ${trend === 'BULLISH ▲' ? 'หาจังหวะ Buy' : 'หาจังหวะ Sell'}</div>`;
      }
    };
  </script>
</body>
</html>
