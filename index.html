<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🤖 AI Trading SMC Pro - XAUUSDT</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:system-ui;background:#0a0f1e;color:#e2e8f0;padding:16px;padding-bottom:120px;}
    .card{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:24px;padding:20px;margin-bottom:16px;border:1px solid #334155;}
    .price{font-size:48px;font-weight:bold;color:#fbbf24;text-align:center;}
    .status{font-size:14px;color:#94a3b8;text-align:center;margin-top:8px;}
    button{background:#3b82f6;border:none;padding:12px 24px;border-radius:40px;color:white;font-weight:bold;cursor:pointer;}
    input{background:#0f172a;border:1px solid #334155;padding:12px;border-radius:40px;color:white;width:80%;}
    .chat-reply{background:#0f172a;padding:16px;border-radius:24px;margin-top:16px;}
    h1{text-align:center;margin-bottom:20px;color:#60a5fa;}
  </style>
</head>
<body>
  <h1>🤖 AI Trading SMC Pro - XAUUSDT</h1>
  <div class="card">
    <div class="price" id="price">$---</div>
    <div class="status" id="status">กำลังเชื่อมต่อ...</div>
  </div>

  <div class="card">
    <h2>📋 ข้อมูลเรียลไทม์</h2>
    <div id="info">รอข้อมูล...</div>
  </div>

  <div class="chat-input" style="position:fixed;bottom:0;left:0;right:0;background:#1e293b;padding:12px;display:flex;gap:8px;">
    <input type="text" id="chatInput" placeholder="💬 ถาม AI">
    <button id="sendBtn">ส่ง</button>
  </div>
  <div id="chatReply" style="margin:8px 12px 80px 12px;"></div>

  <script>
    let currentPrice = 0;
    let priceHistory = [];

    // ดึงราคาจาก Backend Proxy
    async function fetchPrice() {
      try {
        const res = await fetch('/api/price');
        const data = await res.json();
        if (data.price) {
          currentPrice = data.price;
          document.getElementById('price').innerHTML = `$${currentPrice.toFixed(2)}`;
          document.getElementById('status').innerHTML = `อัปเดตล่าสุด: ${new Date().toLocaleTimeString('th-TH')}`;
          
          priceHistory.push(currentPrice);
          if (priceHistory.length > 30) priceHistory.shift();
          
          // คำนวณ RSI ง่ายๆ
          if (priceHistory.length >= 14) {
            let gains = 0, losses = 0;
            for (let i = priceHistory.length-14; i < priceHistory.length; i++) {
              const diff = priceHistory[i] - priceHistory[i-1];
              if (diff >= 0) gains += diff;
              else losses -= diff;
            }
            const avgGain = gains / 14;
            const avgLoss = losses / 14;
            const rsi = avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss));
            document.getElementById('info').innerHTML = `📊 RSI: ${Math.round(rsi)} | ราคาเปลี่ยนแปลง: ${((priceHistory[priceHistory.length-1] - priceHistory[0]) / priceHistory[0] * 100).toFixed(2)}%`;
          }
        }
      } catch(e) {
        document.getElementById('status').innerHTML = 'เชื่อมต่อไม่ได้';
      }
    }

    fetchPrice();
    setInterval(fetchPrice, 2000);

    // AI Chat (DeepSeek)
    const DEEPSEEK_API_KEY = 'YOUR_DEEPSEEK_KEY'; // ใส่ Key ของคุณ

    document.getElementById('sendBtn').onclick = async () => {
      const msg = document.getElementById('chatInput').value.trim();
      if (!msg) return;
      document.getElementById('chatInput').value = '';
      document.getElementById('chatReply').innerHTML = '<div class="chat-reply">🤔 กำลังคิด...</div>';
      
      try {
        const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_API_KEY}` },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [{ role: 'user', content: `คุณคือผู้ช่วยเทรดทองคำ XAUUSDT ราคาตอนนี้ $${currentPrice.toFixed(2)} ตอบสั้น เป็นไทย: ${msg}` }],
            temperature: 0.7,
            max_tokens: 300
          })
        });
        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || 'ไม่สามารถตอบได้';
        document.getElementById('chatReply').innerHTML = `<div class="chat-reply">💬 ${reply}</div>`;
      } catch(e) {
        document.getElementById('chatReply').innerHTML = `<div class="chat-reply">💬 ราคาทอง ${currentPrice.toFixed(2)} | ลองใหม่อีกครั้ง</div>`;
      }
    };
  </script>
</body>
</html>
